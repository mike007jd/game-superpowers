<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STRIKE ZONE — CS-Style FPS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  #c { display: block; width: 100vw; height: 100vh; }
  #hud {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: #fff;
  }
  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 4px; height: 4px;
    transition: all 0.05s ease-out;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.95);
    transition: all 0.08s ease-out;
  }
  #crosshair::before { width: 2px; height: 14px; left: 1px; top: -6px; }
  #crosshair::after { width: 14px; height: 2px; left: -6px; top: 1px; }
  #crosshair .dot {
    position: absolute; width: 2px; height: 2px;
    background: rgba(255,255,255,0.9);
    top: 1px; left: 1px;
  }
  #crosshair.hit .dot { background: #f33; }
  #crosshair.spread::before { height: 10px; top: -5px; opacity: 0.7; }
  #crosshair.spread::after { width: 10px; left: -5px; opacity: 0.7; }
  #stats {
    position: absolute; bottom: 30px; left: 30px;
    font-size: 14px; line-height: 2.0;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
  }
  #stats .health { color: #5f5; }
  #stats .armor { color: #55f; }
  #stats .ammo { color: #ff5; }
  #weapon-name {
    position: absolute; bottom: 30px; right: 30px;
    font-size: 16px; color: #aaa; text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
  }
  #kill-feed {
    position: absolute; top: 20px; right: 20px;
    font-size: 13px; text-align: right;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
  }
  .kf { margin-bottom: 4px; animation: fadeKF 3s forwards; color: #aaa; }
  .kf.headshot { color: #ff5 !important; font-weight: bold; }
  .kf.kill { color: #f55; }
  .kf.botkill { color: #5f5; }
  @keyframes fadeKF { 0%,60%{opacity:1} 100%{opacity:0} }
  #wave-info {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    font-size: 16px; color: #ff5; text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
    transition: all 0.3s;
  }
  #damage-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(255,0,0,0) 100%);
    opacity: 0; pointer-events: none; transition: opacity 0.1s;
  }
  #low-health-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(255,0,0,0) 100%);
    opacity: 0; pointer-events: none;
    animation: lowHealthPulse 1s ease-in-out infinite;
  }
  @keyframes lowHealthPulse {
    0%,100% { opacity: 0; }
    50% { opacity: 0.4; }
  }
  #hitmarker {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px; color: #fff; opacity: 0; pointer-events: none;
    text-shadow: 0 0 8px #f00;
    transition: opacity 0.05s;
  }
  #scope-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.97) 60%);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  #scope-overlay.active { opacity: 1; }
  #scope-overlay .scope-line {
    position: absolute; background: rgba(0,0,0,0.8);
  }
  #scope-overlay .h-line {
    width: 100%; height: 1px; top: 50%;
  }
  #scope-overlay .v-line {
    width: 1px; height: 100%; left: 50%;
  }
  #scope-overlay .cross {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 40px; height: 40px;
    border: 1px solid rgba(255,50,50,0.4);
    border-radius: 50%;
  }
  #weapon-hud {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
  }
  #weapon-icon { font-size: 20px; }
  #reload-bar {
    width: 80px; height: 3px; background: rgba(255,255,255,0.2);
    border-radius: 2px; overflow: hidden; display: none;
  }
  #reload-bar.active { display: block; }
  #reload-fill { height: 100%; background: #ff5; width: 0%; transition: width 1.8s linear; }
  #score-display {
    position: absolute; top: 50px; left: 20px;
    font-size: 14px; color: #aaa; text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
  }
  #kd-display {
    position: absolute; top: 70px; left: 20px;
    font-size: 12px; color: #888; text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
  }
  #wave-announce {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
    font-size: 64px; color: #f55; text-shadow: 0 0 30px #f55;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #wave-announce.show { opacity: 1; }
  #start-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.88); display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 100; cursor: pointer;
  }
  #start-screen h1 {
    font-size: 56px; color: #f55; text-shadow: 0 0 30px #f55, 0 0 60px #f55;
    margin-bottom: 10px; letter-spacing: 6px; animation: titlePulse 2s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%,100% { text-shadow: 0 0 30px #f55, 0 0 60px #f55; }
    50% { text-shadow: 0 0 40px #f55, 0 0 80px #f55, 0 0 120px #f55; }
  }
  #start-screen p { color: #aaa; font-size: 18px; margin: 8px 0; }
  #start-screen .sub { color: #555; font-size: 14px; margin-top: 30px; }
  .controls-grid {
    display: grid; grid-template-columns: auto auto; gap: 6px 24px;
    margin: 20px 0; font-size: 14px; color: #888;
  }
  .controls-grid span { color: #ff5; }
  .tag { display: inline-block; padding: 1px 5px; border-radius: 2px; font-size: 11px; margin-left: 4px; }
  .tag.hs { background: #ff5; color: #000; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="crosshair"><div class="dot"></div></div>
  <div id="damage-overlay"></div>
  <div id="low-health-overlay"></div>
  <div id="hitmarker">✕</div>
  <div id="scope-overlay">
    <div class="scope-line h-line"></div>
    <div class="scope-line v-line"></div>
    <div class="cross"></div>
  </div>
  <div id="stats">
    <div class="health">HP: <span id="hp-val">100</span></div>
    <div class="armor">AR: <span id="ar-val">100</span></div>
    <div class="ammo">AMMO: <span id="ammo-val">30</span>/<span id="ammo-res">90</span></div>
  </div>
  <div id="weapon-hud">
    <div id="weapon-icon">🔫</div>
    <div id="reload-bar"><div id="reload-fill"></div></div>
  </div>
  <div id="weapon-name"></div>
  <div id="wave-info"></div>
  <div id="score-display">SCORE: <span id="score-val">0</span></div>
  <div id="kd-display">K: <span id="kills-val">0</span> / D: <span id="deaths-val">0</span></div>
  <div id="wave-announce"></div>
  <div id="kill-feed"></div>
</div>
<div id="start-screen">
  <h1>STRIKE ZONE</h1>
  <p>CS-Style FPS — Browser Edition</p>
  <div class="controls-grid">
    <span>WASD</span><div>Move</div>
    <span>MOUSE</span><div>Look / Aim</div>
    <span>LMB</span><div>Fire</div>
    <span>R</span><div>Reload</div>
    <span>1-5</span><div>Switch Weapon</div>
    <span>SHIFT</span><div>Sprint</div>
    <span>SPACE</span><div>Jump</div>
    <span>CTRL</span><div>Crouch</div>
    <span>ESC</span><div>Unlock Mouse</div>
  </div>
  <p style="color:#f55;margin-top:20px;">CLICK TO START</p>
  <p class="sub">Defeat all bots. Survive each wave.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
'use strict';

// ─────────────────────────────────────────────
// AUDIO SYSTEM (synthesized)
// ─────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const audio = new AudioCtx();

function playSound(type, vol = 0.3) {
  if (audio.state === 'suspended') audio.resume();
  const t = audio.currentTime;
  const g = audio.createGain();
  g.gain.setValueAtTime(vol, t);
  g.connect(audio.destination);
  if (type === 'ak47') {
    const o = audio.createOscillator(); const n = audio.createOscillator();
    const g2 = audio.createGain(); g2.gain.setValueAtTime(vol * 0.4, t); g2.connect(audio.destination);
    o.type = 'sawtooth'; o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(30, t + 0.15);
    n.type = 'square'; n.frequency.setValueAtTime(80, t); n.frequency.exponentialRampToValueAtTime(20, t + 0.1);
    o.connect(g); n.connect(g2);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.start(t); o.stop(t + 0.2); n.start(t); n.stop(t + 0.12);
    playSound('casing', 0.08);
  } else if (type === 'm4a1') {
    const o = audio.createOscillator(); const n = audio.createOscillator();
    const g2 = audio.createGain(); g2.gain.setValueAtTime(vol * 0.35, t); g2.connect(audio.destination);
    o.type = 'sawtooth'; o.frequency.setValueAtTime(180, t); o.frequency.exponentialRampToValueAtTime(35, t + 0.12);
    n.type = 'square'; n.frequency.setValueAtTime(90, t); n.frequency.exponentialRampToValueAtTime(22, t + 0.08);
    o.connect(g); n.connect(g2);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.start(t); o.stop(t + 0.18); n.start(t); n.stop(t + 0.1);
    playSound('casing', 0.07);
  } else if (type === 'awp') {
    const o = audio.createOscillator(); const g2 = audio.createGain();
    g2.gain.setValueAtTime(vol * 0.9, t); g2.connect(audio.destination);
    o.type = 'sawtooth'; o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(12, t + 0.5);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.6); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    o.connect(g); o.connect(g2);
    o.start(t); o.stop(t + 0.6);
    playSound('casing', 0.1);
  } else if (type === 'smg') {
    const o = audio.createOscillator();
    o.type = 'sawtooth'; o.frequency.setValueAtTime(180, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(g); o.start(t); o.stop(t + 0.12);
    playSound('casing', 0.06);
  } else if (type === 'pistol') {
    const o = audio.createOscillator();
    o.type = 'square'; o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(50, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    o.connect(g); o.start(t); o.stop(t + 0.08);
    playSound('casing', 0.05);
  } else if (type === 'reload') {
    for (let i = 0; i < 4; i++) {
      const o = audio.createOscillator();
      o.type = 'triangle'; o.frequency.setValueAtTime(200 + i * 150, t + i * 0.15);
      g.gain.setValueAtTime(vol * 0.3, t + i * 0.15);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.15 + 0.1);
      o.connect(g); o.start(t + i * 0.15); o.stop(t + i * 0.15 + 0.1);
    }
  } else if (type === 'empty') {
    const o = audio.createOscillator(); o.type = 'square';
    o.frequency.setValueAtTime(100, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    o.connect(g); o.start(t); o.stop(t + 0.04);
  } else if (type === 'hit') {
    const o = audio.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(600, t); o.frequency.exponentialRampToValueAtTime(150, t + 0.07);
    g.gain.setValueAtTime(vol * 0.35, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
    o.connect(g); o.start(t); o.stop(t + 0.09);
  } else if (type === 'headshot') {
    const o = audio.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(1200, t); o.frequency.exponentialRampToValueAtTime(200, t + 0.2);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    o.connect(g); o.start(t); o.stop(t + 0.25);
  } else if (type === 'kill') {
    [600,900,1200].forEach((f,i) => {
      const o = audio.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(f, t + i * 0.07);
      g.gain.setValueAtTime(vol * 0.5, t + i * 0.07);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.15);
      o.connect(g); o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.15);
    });
  } else if (type === 'death') {
    const o = audio.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(400, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.6);
    g.gain.setValueAtTime(vol * 0.55, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
    o.connect(g); o.start(t); o.stop(t + 0.7);
  } else if (type === 'footstep') {
    const o = audio.createOscillator(); o.type = 'triangle';
    o.frequency.setValueAtTime(60 + Math.random() * 30, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    o.connect(g); o.start(t); o.stop(t + 0.05);
  } else if (type === 'casing') {
    const o = audio.createOscillator(); o.type = 'square';
    o.frequency.setValueAtTime(800 + Math.random() * 400, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
    o.connect(g); o.start(t); o.stop(t + 0.03);
  } else if (type === 'pickup') {
    [440,660,880].forEach((f,i) => {
      const o = audio.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(f, t + i * 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.2);
      o.connect(g); o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.2);
    });
  } else if (type === 'lowhealth') {
    const o = audio.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(80, t); o.frequency.exponentialRampToValueAtTime(60, t + 0.3);
    g.gain.setValueAtTime(vol * 0.2, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    o.connect(g); o.start(t); o.stop(t + 0.4);
  } else if (type === 'wade') {
    const o = audio.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(200, t); o.frequency.exponentialRampToValueAtTime(80, t + 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(g); o.start(t); o.stop(t + 0.12);
  }
}

// ─────────────────────────────────────────────
// THREE.JS SETUP
// ─────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.012);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.05, 300);
camera.position.set(0, 1.7, 0);

const clock = new THREE.Clock();

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});
renderer.setSize(innerWidth, innerHeight);

// ─────────────────────────────────────────────
// LIGHTING
// ─────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x334466, 0.5));

const sun = new THREE.DirectionalLight(0xffeedd, 1.0);
sun.position.set(20, 50, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 200;
sun.shadow.camera.left = -70;
sun.shadow.camera.right = 70;
sun.shadow.camera.top = 70;
sun.shadow.camera.bottom = -70;
sun.shadow.bias = -0.001;
scene.add(sun);

const fillLight = new THREE.PointLight(0x4466aa, 0.4, 80);
fillLight.position.set(-15, 10, -15);
scene.add(fillLight);

const alertLight1 = new THREE.PointLight(0xff3333, 0.0, 30);
alertLight1.position.set(0, 5, 0);
scene.add(alertLight1);

// ─────────────────────────────────────────────
// MATERIALS
// ─────────────────────────────────────────────
const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.8, metalness: 0.1 });
const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a28, roughness: 0.95, metalness: 0.0 });
const ceilMat = new THREE.MeshStandardMaterial({ color: 0x111120, roughness: 0.9 });
const crateMat = new THREE.MeshStandardMaterial({ color: 0x5a4a3a, roughness: 0.7, metalness: 0.0 });
const metalMat = new THREE.MeshStandardMaterial({ color: 0x3a3a4a, roughness: 0.4, metalness: 0.7 });
const botMats = [
  new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.5, metalness: 0.2 }),
  new THREE.MeshStandardMaterial({ color: 0x3366cc, roughness: 0.5, metalness: 0.2 }),
  new THREE.MeshStandardMaterial({ color: 0x33cc66, roughness: 0.5, metalness: 0.2 }),
  new THREE.MeshStandardMaterial({ color: 0xccaa33, roughness: 0.5, metalness: 0.2 }),
];
const headMat = new THREE.MeshStandardMaterial({ color: 0xffddb0, roughness: 0.6 });

// ─────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────
const colliders = [];
const bullets = [];
const bots = [];
const muzzleFlashes = [];
const bloodParticles = [];
const sparkParticles = [];
const shellCasings = [];
const botNames = ['VIPER','HAWK','GHOST','REAPER','WOLF','NEMESIS','CIPHER','PHOENIX','SHADOW','RAVEN'];

// ─────────────────────────────────────────────
// MAP BUILDER
// ─────────────────────────────────────────────
function addBox(x, y, z, w, h, d, mat, shadow = true) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  m.castShadow = shadow; m.receiveShadow = true;
  scene.add(m);
  colliders.push({ minX: x - w/2, maxX: x + w/2, minY: y - h/2, maxY: y + h/2, minZ: z - d/2, maxZ: z + d/2 });
  return m;
}

function buildMap() {
  const floorGeo = new THREE.PlaneGeometry(140, 140);
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
  scene.add(floor);
  colliders.push({ minX: -70, maxX: 70, minY: -0.01, maxY: 0.01, minZ: -70, maxZ: 70 });

  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(140, 140), ceilMat);
  ceil.rotation.x = Math.PI / 2; ceil.position.y = 7;
  scene.add(ceil);

  addBox(0, 3.5, -70, 140, 7, 1, wallMat);
  addBox(0, 3.5, 70, 140, 7, 1, wallMat);
  addBox(-70, 3.5, 0, 1, 7, 140, wallMat);
  addBox(70, 3.5, 0, 1, 7, 140, wallMat);

  addBox(-25, 1.5, -35, 14, 3, 1, wallMat);
  addBox(25, 1.5, -35, 14, 3, 1, wallMat);
  addBox(0, 3.5, -35, 1, 7, 10, wallMat);
  addBox(-35, 1.5, 0, 1, 3, 25, wallMat);
  addBox(35, 1.5, 0, 1, 3, 25, wallMat);
  addBox(0, 1.5, 25, 18, 3, 1, wallMat);
  addBox(-12, 1.5, 12, 8, 3, 8, crateMat);
  addBox(14, 1.5, 6, 5, 3, 5, crateMat);
  addBox(-18, 1.5, -18, 5, 3, 5, crateMat);
  addBox(18, 1.5, -18, 5, 3, 5, crateMat);
  addBox(0, 1.5, -55, 10, 3, 10, crateMat);
  addBox(-50, 1.5, 30, 6, 3, 6, crateMat);
  addBox(50, 1.5, -30, 6, 3, 6, crateMat);

  for (let i = -3; i <= 3; i++) {
    addBox(i * 18, 3.5, -52, 2.5, 7, 2.5, metalMat);
    addBox(i * 18, 3.5, 52, 2.5, 7, 2.5, metalMat);
  }

  // ramps
  for (let side = -1; side <= 1; side += 2) {
    const rampGeo = new THREE.BoxGeometry(8, 0.5, 12);
    const ramp = new THREE.Mesh(rampGeo, crateMat);
    ramp.position.set(side * 45, 0.5, 0);
    ramp.rotation.z = side * 0.18;
    ramp.castShadow = true; ramp.receiveShadow = true;
    scene.add(ramp);
  }

  // platform
  const platGeo = new THREE.BoxGeometry(20, 0.5, 20);
  const plat = new THREE.Mesh(platGeo, metalMat);
  plat.position.set(0, 3.5, -55);
  plat.castShadow = true; plat.receiveShadow = true;
  scene.add(plat);
  colliders.push({ minX: -10, maxX: 10, minY: 3.25, maxY: 3.75, minZ: -65, maxZ: -45 });

  // light strips
  for (let z = -50; z <= 50; z += 25) {
    const stripGeo = new THREE.BoxGeometry(80, 0.1, 0.6);
    const stripMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: new THREE.Color(0x3344cc), emissiveIntensity: 0.8 });
    const strip = new THREE.Mesh(stripGeo, stripMat);
    strip.position.set(0, 6.9, z);
    scene.add(strip);
  }

  // spawn zone markers
  for (let z = -60; z <= 60; z += 20) {
    const markGeo = new THREE.BoxGeometry(1, 0.02, 2);
    const markMat = new THREE.MeshBasicMaterial({ color: 0xff5 });
    for (let x = -40; x <= 40; x += 20) {
      const mark = new THREE.Mesh(markGeo, markMat);
      mark.position.set(x, 0.01, z);
      scene.add(mark);
    }
  }
}

// ─────────────────────────────────────────────
// COLLISION
// ─────────────────────────────────────────────
function resolveCollisions(pos, radius, height=3.5) {
  for (const c of colliders) {
    if (pos.x+radius > c.minX && pos.x-radius < c.maxX &&
        pos.y > c.minY && pos.y < c.maxY &&
        pos.z+radius > c.minZ && pos.z-radius < c.maxZ) {
      const dx1=pos.x-c.minX, dx2=c.maxX-pos.x;
      const dz1=pos.z-c.minZ, dz2=c.maxZ-pos.z;
      const dy1=pos.y-c.minY, dy2=c.maxY-pos.y;
      const minD=Math.min(dx1,dx2,dz1,dz2,dy1+radius,dy2+radius);
      if      (minD===dx1) pos.x=c.minX-radius;
      else if (minD===dx2) pos.x=c.maxX+radius;
      else if (minD===dz1) pos.z=c.minZ-radius;
      else if (minD===dz2) pos.z=c.maxZ+radius;
      else if (minD===dy1+radius) pos.y=c.minY-radius;
      else pos.y=c.maxY+radius;
    }
  }
  pos.x = Math.max(-69, Math.min(69, pos.x));
  pos.z = Math.max(-69, Math.min(69, pos.z));
}

// ─────────────────────────────────────────────
// PLAYER MOVEMENT
// ─────────────────────────────────────────────
const moveDir = new THREE.Vector3();
let footTimer = 0;
let jumpLandTimer = 0;

function updatePlayer(dt) {
  camera.rotation.order = 'YXZ';
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;

  const crouchH = player.crouching ? 1.0 : 1.7;
  camera.position.y += (crouchH - camera.position.y) * 0.2;

  const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right   = new THREE.Vector3(Math.cos(player.yaw), 0, -Math.sin(player.yaw));

  moveDir.set(0,0,0);
  if (keys['KeyW']) moveDir.addScaledVector(forward, 1);
  if (keys['KeyS']) moveDir.addScaledVector(forward, -1);
  if (keys['KeyA']) moveDir.addScaledVector(right, -1);
  if (keys['KeyD']) moveDir.addScaledVector(right, 1);

  const isMoving = moveDir.length() > 0;
  const sprintMult = keys['ShiftLeft'] && isMoving ? 1.55 : 1.0;
  const crouchMult = player.crouching ? 0.5 : 1.0;

  if (isMoving) {
    moveDir.normalize();
    player.bobCycle += dt * (keys['ShiftLeft'] ? 14 : 10) * crouchMult;
    footTimer += dt * crouchMult;
    if (footTimer > (player.crouching ? 0.7 : keys['ShiftLeft'] ? 0.25 : 0.38)) {
      playSound('footstep', player.crouching ? 0.06 : 0.12);
      footTimer = 0;
    }
  }

  player.vel.x *= 0.82; player.vel.z *= 0.82;
  const speed = 7 * sprintMult * crouchMult;
  camera.position.x += moveDir.x * speed * dt;
  camera.position.z += moveDir.z * speed * dt;
  resolveCollisions(camera.position, 0.4);

  if (camera.position.y > crouchH + 0.05) {
    player.vel.y -= 22 * dt;
    camera.position.y += player.vel.y * dt;
    if (camera.position.y < crouchH) {
      if (!player.onGround && player.vel.y < -3) { playSound('wade', 0.3); }
      camera.position.y = crouchH;
      player.vel.y = 0;
      player.onGround = true;
    }
  } else { player.onGround = true; }

  // weapon bob
  const bobX = Math.sin(player.bobCycle) * 0.008;
  const bobY = Math.abs(Math.cos(player.bobCycle)) * 0.012;
  camera.position.x += bobX;
  camera.position.y += bobY * 0.3;

  // screen shake
  if (player.shakeAmt > 0) {
    camera.rotation.x += (Math.random()-0.5)*player.shakeAmt;
    camera.rotation.y += (Math.random()-0.5)*player.shakeAmt;
    player.shakeAmt *= 0.82;
    if (player.shakeAmt < 0.003) player.shakeAmt = 0;
  }

  // dynamic crosshair
  const isShooting = !player.canShoot || player.isReloading;
  const targetSpread = isShooting ? 18 : (isMoving ? 12 : 4);
  crosshairSpread += (targetSpread - crosshairSpread) * 0.25;
  const ch = document.getElementById('crosshair');
  ch.style.width = (4 + crosshairSpread) + 'px';
  ch.style.height = (4 + crosshairSpread) + 'px';
  if (crosshairSpread > 10) ch.classList.add('spread'); else ch.classList.remove('spread');

  // low health warning
  if (player.health <= 30 && player.health > 0) {
    const now = performance.now();
    if (now - player.lastLowHealthTime > 1500) {
      playSound('lowhealth', 0.15);
      player.lastLowHealthTime = now;
    }
    document.getElementById('low-health-overlay').style.opacity = (1 - player.health/30) * 0.5;
  } else {
    document.getElementById('low-health-overlay').style.opacity = '0';
  }
}

// ─────────────────────────────────────────────
// SHOOTING
// ─────────────────────────────────────────────
function shoot() {
  if (!player.canShoot || player.isReloading) return;
  if (player.ammo <= 0) { playSound('empty', 0.2); return; }

  player.ammo--;
  player.canShoot = false;
  playSound(weapon.sound, 0.35);
  player.shakeAmt = weapon.recoil * 0.35;
  player.pitch += weapon.recoil * 0.06;
  crosshairSpread = 20;

  spawnMuzzleFlash();
  spawnShellCasing();

  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyQuaternion(camera.quaternion);
  dir.x += (Math.random()-0.5)*weapon.spread;
  dir.y += (Math.random()-0.5)*weapon.spread;
  dir.z += (Math.random()-0.5)*weapon.spread;
  dir.normalize();

  const ray = new THREE.Raycaster(camera.position.clone().addScaledVector(dir, 0.2), dir);
  const hits = ray.intersectObjects(scene.children, false);

  let hitBot = null, hitDist = Infinity, hitHead = false, hitPoint = null;
  for (const h of hits) {
    if (!h.object.isBot) continue;
    const d = h.distance;
    if (d < hitDist) {
      hitDist = d;
      hitBot = h.object.botRef;
      hitPoint = h.point;
      hitHead = h.object.isHead || (h.object === h.object); // check via sub-mesh index
    }
  }

  // detect headshot via sub-mesh index (head is index 1)
  if (hitBot) {
    const hitObj = hits.find(h => h.object.isBot);
    if (hitObj) {
      const headIdx = hitBot.group.children.indexOf(hitObj.object);
      hitHead = (headIdx === 1);
    }
    const dmg = hitHead ? weapon.hsDmg : weapon.damage;
    hitBot.takeDamage(dmg, dir, hitHead);
    showHitmarker(hitHead);
    spawnBlood(hitPoint || hitBot.group.position);
    playSound(hitHead ? 'headshot' : 'hit', 0.35);
  } else {
    for (const h of hits) {
      if (!h.object.isBot) { spawnSparks(h.point); break; }
    }
  }

  spawnTracer(camera.position.clone().addScaledVector(dir, 0.5), dir, hitDist < Infinity ? hitDist : 100);
  updateHUD();
  setTimeout(() => { player.canShoot = true; }, weapon.fireRate * 1000);
}

function reload() {
  if (player.isReloading || player.reserve <= 0 || player.ammo === weapon.magSize) return;
  player.isReloading = true;
  document.getElementById('reload-bar').classList.add('active');
  document.getElementById('reload-fill').style.width = '100%';
  playSound('reload', 0.25);
  setTimeout(() => {
    const needed = weapon.magSize - player.ammo;
    const give = Math.min(needed, player.reserve);
    player.ammo += give;
    player.reserve -= give;
    player.isReloading = false;
    document.getElementById('reload-bar').classList.remove('active');
    document.getElementById('reload-fill').style.width = '0%';
    updateHUD();
  }, weapon.type === 'sniper' ? 2800 : 1800);
}

// ─────────────────────────────────────────────
// BOT SYSTEM
// ─────────────────────────────────────────────
function createBot(x, z, team, name) {
  const group = new THREE.Group();
  const bmat = botMats[team % botMats.length];

  const bodyGeo = new THREE.BoxGeometry(0.6, 1.0, 0.4);
  const body = new THREE.Mesh(bodyGeo, bmat);
  body.position.y = 0.7; body.castShadow = true;
  group.add(body);

  const headGeo = new THREE.BoxGeometry(0.38, 0.38, 0.38);
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.5; head.castShadow = true;
  group.add(head);

  const legGeo = new THREE.BoxGeometry(0.2, 0.7, 0.2);
  const legL = new THREE.Mesh(legGeo, bmat); legL.position.set(-0.15, 0.15, 0); legL.castShadow = true; group.add(legL);
  const legR = new THREE.Mesh(legGeo, bmat); legR.position.set(0.15, 0.15, 0); legR.castShadow = true; group.add(legR);

  const armGeo = new THREE.BoxGeometry(0.2, 0.6, 0.2);
  const armL = new THREE.Mesh(armGeo, bmat); armL.position.set(-0.5, 0.8, 0); armL.castShadow = true; group.add(armL);
  const armR = new THREE.Mesh(armGeo, bmat); armR.position.set(0.5, 0.8, 0); armR.castShadow = true; group.add(armR);

  group.position.set(x, 0, z);
  group.isBot = true;
  group.isHead = false;
  scene.add(group);

  // Mark head sub-mesh for headshot detection
  head.isHead = true;
  head.isBot = true;
  head.botRef = null; // will be set below

  const bot = {
    group, head, body,
    health:100, maxHealth:100,
    vel:new THREE.Vector3(),
    state:'patrol', target:new THREE.Vector3(x,0,z),
    shootTimer:0, ammo:30, team, name,
    walkCycle:0, alive:true, shootCooldown:0,
    takeDamage(dmg, dir, isHeadshot) {
      this.health -= dmg;
      const sc = Math.max(0.01, this.health / this.maxHealth);
      this.body.scale.set(sc, sc, sc);
      this.body.position.y = 0.7 - (1-sc)*0.5;
      if (this.health <= 0) this.die(isHeadshot);
    },
    die(isHeadshot) {
      this.alive = false;
      playSound('kill', 0.45);
      player.score += isHeadshot ? 150 : 100;
      player.kills++;
      const g = this.group;
      g.rotation.z = (Math.random()-0.5)*0.5;
      g.rotation.x = Math.PI * 0.6;
      g.position.y = 0.2;
      setTimeout(() => { scene.remove(g); const i=bots.indexOf(this); if(i!==-1) bots.splice(i,1); }, 3500);
      const hsTag = isHeadshot ? '<span class="tag hs">HS</span>' : '';
      addKillFeed(`<b>${weapon.name}</b>`, `${this.name}${hsTag}`, '#5f5');
      updateHUD();
      checkWave();
    }
  };

  head.botRef = bot;
  body.botRef = bot;
  group.botRef = bot;
  bots.push(bot);
  return bot;
}

const botNamesPool = [...botNames];
function getBotName() {
  if (botNamesPool.length === 0) return botNames[Math.floor(Math.random()*botNames.length)];
  const idx = Math.floor(Math.random()*botNamesPool.length);
  return botNamesPool.splice(idx,1)[0];
}

function getRandomSpawn() {
  const spots = [
    [-35,-55],[35,-55],[0,-60],[-28,50],[28,50],[0,58],
    [-55,0],[55,0],[-20,-25],[20,-25],[-48,35],[48,-35],
  ];
  const s = spots[Math.floor(Math.random()*spots.length)];
  return { x:s[0]+(Math.random()-0.5)*5, z:s[1]+(Math.random()-0.5)*5 };
}

function spawnWave(count) {
  for (let i = 0; i < count; i++) {
    const sp = getRandomSpawn();
    createBot(sp.x, sp.z, i % botMats.length, getBotName());
  }
}

function updateBots(dt) {
  for (const bot of bots) {
    if (!bot.alive) continue;
    bot.walkCycle += dt * 4;
    bot.group.children[2].position.y = 0.15 + Math.abs(Math.sin(bot.walkCycle))*0.1;
    bot.group.children[3].position.y = 0.15 + Math.abs(Math.cos(bot.walkCycle))*0.1;

    const toPlayer = new THREE.Vector3().subVectors(camera.position, bot.group.position);
    toPlayer.y = 0;
    const dist = toPlayer.length();

    if (toPlayer.length() > 0.1) {
      bot.group.rotation.y = Math.atan2(toPlayer.x, toPlayer.z);
    }

    if (dist < 55) {
      bot.state = dist < 10 ? 'attack' : 'chase';
      if (dist < 10 && bot.shootCooldown <= 0 && bot.ammo > 0) {
        shootBot(bot, toPlayer.clone().normalize());
        bot.shootCooldown = 0.5 + Math.random()*0.5;
        bot.ammo--;
      }
      if (bot.ammo <= 0) { bot.ammo = 30; bot.shootCooldown = 2.5; }
      bot.shootCooldown -= dt;

      if (dist > 2.5) {
        const spd = 3.5;
        bot.group.position.x += toPlayer.x * spd * dt;
        bot.group.position.z += toPlayer.z * spd * dt;
        resolveCollisions(bot.group.position, 0.3);
      }
    } else {
      bot.state = 'patrol';
      if (Math.random() < 0.008) {
        bot.target.set((Math.random()-0.5)*80, 0, (Math.random()-0.5)*80);
      }
      const td = new THREE.Vector3().subVectors(bot.target, bot.group.position); td.y = 0;
      if (td.length() > 1.5) { td.normalize(); bot.group.position.x += td.x*2*dt; bot.group.position.z += td.z*2*dt; }
    }
  }
}

function shootBot(bot, dir) {
  playSound('ak47', 0.12);
  const spr = 0.1;
  dir.x += (Math.random()-0.5)*spr; dir.y += (Math.random()-0.5)*spr*0.4; dir.z += (Math.random()-0.5)*spr;
  dir.normalize();

  const origin = bot.group.position.clone().add(new THREE.Vector3(0, 1.2, 0));
  const len = 35;
  const geo = new THREE.BufferGeometry().setFromPoints([origin.clone(), origin.clone().addScaledVector(dir, len)]);
  const mat = new THREE.LineBasicMaterial({ color:0xff3333, transparent:true, opacity:0.5 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  bullets.push({ mesh:line, life:0.1 });

  const ray = new THREE.Raycaster(origin, dir);
  const hits = ray.intersectObjects([camera], false);
  if (hits.length > 0 && hits[0].distance < len) {
    const dmg = 6 + Math.floor(Math.random()*10);
    playerTakeDamage(dmg);
  }
}

function playerTakeDamage(dmg) {
  let absorbed = 0;
  if (player.armor > 0) { absorbed = Math.min(player.armor, dmg*0.65); player.armor -= absorbed; }
  const net = dmg - absorbed;
  player.health = Math.max(0, player.health - net);
  updateHUD();

  const ov = document.getElementById('damage-overlay');
  const intensity = 0.25 + (1 - player.health/100)*0.35;
  ov.style.background = `radial-gradient(ellipse at center, transparent 25%, rgba(255,0,0,${intensity}) 100%)`;
  ov.style.opacity = '1';
  setTimeout(() => { ov.style.opacity = '0'; }, 120);

  if (player.health <= 0) playerDeath();
}

function playerDeath() {
  playSound('death', 0.6);
  player.deaths++;
  player.health = 100; player.armor = 100;
  player.ammo = weapon.magSize; player.reserve = weapon.reserve;
  player.score = Math.max(0, player.score - 15);
  player.lastLowHealthTime = 0;
  camera.position.set(0, 1.7, 0);
  player.yaw = 0; player.pitch = 0;
  updateHUD();
  addKillFeed('YOU', 'WERE ELIMINATED', '#f55');
  document.getElementById('scope-overlay').classList.remove('active');
  setTimeout(() => playSound('pickup', 0.2), 600);
}

function checkWave() {
  if (bots.filter(b=>b.alive).length === 0) {
    wave++;
    player.score += wave * 50;
    announceWave(wave);
    setTimeout(() => spawnWave(Math.min(wave + 2, 12)), 2000);
  }
}

function announceWave(n) {
  const el = document.getElementById('wave-announce');
  el.textContent = `WAVE ${n}`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// ─────────────────────────────────────────────
// HUD
// ─────────────────────────────────────────────
let wave = 0;
function updateHUD() {
  document.getElementById('hp-val').textContent = player.health;
  document.getElementById('ar-val').textContent = player.armor;
  document.getElementById('ammo-val').textContent = player.ammo;
  document.getElementById('ammo-res').textContent = player.reserve;
  document.getElementById('score-val').textContent = player.score;
  document.getElementById('kills-val').textContent = player.kills;
  document.getElementById('deaths-val').textContent = player.deaths;
}

function addKillFeed(action, target, color) {
  const kf = document.getElementById('kill-feed');
  const div = document.createElement('div');
  div.className = 'kf kill';
  div.style.color = color;
  div.innerHTML = `<span style="color:#aaa">${action}</span> → ${target}`;
  kf.appendChild(div);
  setTimeout(() => div.remove(), 3500);
}

// ─────────────────────────────────────────────
// PARTICLE UPDATES
// ─────────────────────────────────────────────
function updateParticles(dt) {
  for (let i = bullets.length-1; i>=0; i--) {
    const b = bullets[i]; b.life -= dt;
    if (b.life<=0) { scene.remove(b.mesh); bullets.splice(i,1); }
  }
  for (let i = muzzleFlashes.length-1; i>=0; i--) {
    const m = muzzleFlashes[i]; m.life -= dt;
    m.mat.opacity = m.life / 0.04;
    if (m.life<=0) { scene.remove(m.mesh); muzzleFlashes.splice(i,1); }
  }
  for (let i = bloodParticles.length-1; i>=0; i--) {
    const p = bloodParticles[i]; p.life -= dt;
    p.vel.y -= 9.8*dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    p.mat.opacity = Math.max(0, p.life / 0.8);
    if (p.life<=0) { scene.remove(p.mesh); bloodParticles.splice(i,1); }
  }
  for (let i = sparkParticles.length-1; i>=0; i--) {
    const p = sparkParticles[i]; p.life -= dt;
    p.vel.y -= 9.8*dt;
    p.mesh.position.addScaledVector(p.vel, dt);
    if (p.life<=0) { scene.remove(p.mesh); sparkParticles.splice(i,1); }
  }
  for (let i = shellCasings.length-1; i>=0; i--) {
    const s = shellCasings[i]; s.life -= dt;
    s.vel.y -= 12*dt;
    s.mesh.position.addScaledVector(s.vel, dt);
    s.mesh.rotation.x += s.rotVel.x * dt;
    s.mesh.rotation.y += s.rotVel.y * dt;
    s.mesh.rotation.z += s.rotVel.z * dt;
    if (s.life<=0 || s.mesh.position.y < 0) { scene.remove(s.mesh); shellCasings.splice(i,1); }
  }
  if (hitTimer > 0) {
    hitTimer -= dt;
    if (hitTimer <= 0) {
      document.getElementById('hitmarker').style.opacity = '0';
      document.getElementById('crosshair').classList.remove('hit');
    }
  }
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
document.getElementById('weapon-name').textContent = weapon.name;
document.getElementById('weapon-icon').textContent = weapon.icon;
updateHUD();

setTimeout(() => {
  wave = 1;
  document.getElementById('wave-info').textContent = 'WAVE 1';
  announceWave(1);
  spawnWave(3);
}, 600);

// ─────────────────────────────────────────────
// GAME LOOP
// ─────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (locked) {
    updatePlayer(dt);
    updateBots(dt);
    updateParticles(dt);
  }
  renderer.render(scene, camera);
}
animate();
</script>
